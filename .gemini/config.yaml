have_fun: true

ignore_patterns:
  - "vendor/**"
  - "node_modules/**"
  - "*.min.js"
  - "*.min.css"
  - "style.css"
  - "style.css.map"
  - "assets/css/**"
  - "assets/font/**"
  - "languages/**"
  - "package-lock.json"
  - "composer.lock"

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: true
