name: E2E Tests

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

jobs:
    matrix-prep:
        name: Prepare matrix
        runs-on: ubuntu-latest
        outputs:
            wp-versions: ${{ steps.wp-versions.outputs.matrix }}
        steps:
            - id: wp-versions
              run: echo 'matrix=[{"input":"latest","core":"null"}]' >> "$GITHUB_OUTPUT"

    e2e:
        name: WP ${{ matrix.wp.input }}
        needs: matrix-prep
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                wp: ${{ fromJson(needs.matrix-prep.outputs.wp-versions) }}
        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  coverage: none
                  tools: composer:^2.9.8

            - name: Install Composer dependencies
              if: hashFiles('composer.json') != ''
              run: composer install --no-interaction --prefer-dist

            - name: Build theme assets
              uses: ./.github/actions/build
              with:
                  working-directory: .

            - name: Install wp-env
              run: npm install -g @wordpress/env

            - name: Configure wp-env override
              if: matrix.wp.core != 'null'
              run: echo '{ "core": "${{ matrix.wp.core }}" }' > .wp-env.override.json

            - name: Start wp-env
              run: npx wp-env start

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Run Playwright tests
              run: npx playwright test
              env:
                  WP_BASE_URL: http://localhost:8888
                  WP_ADMIN_USER: admin
                  WP_ADMIN_PASSWORD: password

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report-wp${{ matrix.wp.input }}
                  path: |
                      playwright-report/
                      test-results/
                  retention-days: 7

    e2e-summary:
        name: E2E
        needs: e2e
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Check matrix result
              run: |
                  if [ "${{ needs.e2e.result }}" != "success" ]; then
                      echo "::error::E2E matrix did not succeed (result: ${{ needs.e2e.result }})"
                      exit 1
                  fi
