name: Prerelease

on:
    workflow_dispatch:
        inputs:
            label:
                description: 'Prerelease label (e.g. beta.1, RC.1)'
                required: true

jobs:
    prerelease:
        uses: apermo/reusable-workflows/.github/workflows/reusable-prerelease.yml@v0.2.0
        permissions:
            contents: write
            pull-requests: write
